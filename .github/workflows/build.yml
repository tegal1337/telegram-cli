name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache TDLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: ~/td/tdlib
          key: tdlib-${{ matrix.os }}-v1.8.43

      - name: Setup TDLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: ./scripts/setup-tdlib.sh

      - name: Build
        run: make build

      - uses: actions/upload-artifact@v4
        with:
          name: tele-tui-linux-amd64-${{ matrix.os }}
          path: bin/tele-tui

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache TDLib
        id: cache-tdlib-win
        uses: actions/cache@v4
        with:
          path: C:/td/tdlib
          key: tdlib-windows-static-v1.8.43

      - name: Install build tools
        if: steps.cache-tdlib-win.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          choco install cmake gperf -y

      - name: Build TDLib
        if: steps.cache-tdlib-win.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/tdlib/td.git C:\td\td-src
          cd C:\td\td-src
          mkdir build
          cd build
          cmake -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=C:\td\tdlib ..
          cmake --build . --target tdjson --config Release --parallel
          cmake --install . --config Release

      - name: Build telegram-cli
        shell: cmd
        run: |
          set CGO_ENABLED=1
          set CGO_CFLAGS=-IC:\td\tdlib\include
          set CGO_LDFLAGS=-LC:\td\tdlib\lib -ltdjson
          go build -trimpath -ldflags="-s -w" -o bin\tele-tui.exe .\cmd\teletui

      - name: Verify
        shell: cmd
        run: dir bin\tele-tui.exe

      - uses: actions/upload-artifact@v4
        with:
          name: tele-tui-windows-amd64
          path: bin/tele-tui.exe

  release:
    name: Release
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package
        run: |
          mkdir release
          for dir in artifacts/tele-tui-linux-*; do
            name=$(basename "$dir"); cp "$dir/tele-tui" "release/${name}"; chmod +x "release/${name}"
          done
          cp artifacts/tele-tui-windows-amd64/tele-tui.exe release/tele-tui-windows-amd64.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
