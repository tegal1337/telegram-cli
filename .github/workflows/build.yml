name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache TDLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: ~/td/tdlib
          key: tdlib-${{ matrix.os }}-v1.8.43

      - name: Setup TDLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: ./scripts/setup-tdlib.sh

      - name: Build
        run: make build

      - uses: actions/upload-artifact@v4
        with:
          name: tele-tui-linux-amd64-${{ matrix.os }}
          path: bin/tele-tui

  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x86_64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup TDLib
        run: brew install tdlib

      - name: Build
        run: make build

      - uses: actions/upload-artifact@v4
        with:
          name: tele-tui-darwin-${{ matrix.arch }}
          path: bin/tele-tui

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache vcpkg + TDLib
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/td/tdlib
          key: tdlib-windows-vcpkg-v1.8.43

      - name: Install TDLib via vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          cd C:\vcpkg
          git pull
          vcpkg install tdlib:x64-windows

      - name: Setup TDLib paths
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg\installed\x64-windows"
          echo "CGO_CFLAGS=-I${vcpkgRoot}\include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L${vcpkgRoot}\bin -ltdjson" >> $env:GITHUB_ENV
          echo "${vcpkgRoot}\bin" >> $env:GITHUB_PATH

      - name: Build
        shell: cmd
        run: |
          set CGO_ENABLED=1
          go build -trimpath -ldflags="-s -w" -o bin\tele-tui.exe .\cmd\teletui

      - name: Verify
        shell: cmd
        run: dir bin\tele-tui.exe

      - uses: actions/upload-artifact@v4
        with:
          name: tele-tui-windows-amd64
          path: bin/tele-tui.exe

  release:
    name: Release
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package
        run: |
          mkdir release
          for dir in artifacts/tele-tui-linux-*; do
            name=$(basename "$dir"); cp "$dir/tele-tui" "release/${name}"; chmod +x "release/${name}"
          done
          for dir in artifacts/tele-tui-darwin-*; do
            name=$(basename "$dir"); cp "$dir/tele-tui" "release/${name}"; chmod +x "release/${name}"
          done
          cp artifacts/tele-tui-windows-amd64/tele-tui.exe release/tele-tui-windows-amd64.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
